registry_name: rdm_variable_registry
registry_title: Example variable registry for experimental and simulation data
version: 0.1.0
status: draft
maintainers:
  - organization: ZBT
created: 2026-04-03
description: >
  Example reference registry for canonical variable names, units, qualifiers,
  and contextual semantics for research data management workflows. This example
  focuses on laboratory test benches, CFD, multiphysics simulation, and
  electrochemical devices such as PEM electrolyzers.

naming_rules:
  canonical_id_format: snake_case
  qualifier_id_format: snake_case
  principle: >
    Canonical identifiers describe the physical meaning of a concept.
    Measurement position, derivation method, source-specific naming, and
    geometry-specific context are represented through qualifiers and metadata,
    not by creating separate canonical variables for every location.

defaults:
  unit_system: SI
  string_case_sensitive: false
  status: active

qualifier_vocabularies:

  acquisition_origin:
    description: How the value entered the data system.
    allowed_values:
      - measured
      - simulated
      - derived
      - imported
      - estimated
      - fitted
      - normalized
      - interpolated
      - aggregated

  representation:
    description: Structural or statistical representation of the quantity.
    allowed_values:
      - scalar
      - vector
      - tensor
      - field
      - timeseries
      - profile
      - map
      - point_value
      - point_series
      - plane_average
      - line_average
      - area_average
      - volume_average
      - mass_average
      - molar_average
      - integral
      - minimum
      - maximum
      - standard_deviation

  evaluation_method:
    description: How the quantity was extracted or reduced from raw data.
    allowed_values:
      - direct_sensor_reading
      - control_system_readout
      - probe_extraction
      - postprocessing_point_probe
      - postprocessing_line_probe
      - postprocessing_plane_probe
      - postprocessing_volume_probe
      - cell_average
      - face_average
      - node_value
      - time_average
      - cycle_average
      - window_average
      - spatial_interpolation
      - temporal_interpolation
      - numerical_integration
      - balance_calculation
      - regression
      - manual_entry

  system:
    description: High-level system context.
    allowed_values:
      - test_bench
      - simulation
      - postprocessing
      - database
      - experiment
      - digital_twin

  component:
    description: Functional subsystem or device region.
    allowed_values:
      - full_system
      - test_section
      - feed_line
      - return_line
      - anode_loop
      - cathode_loop
      - coolant_loop
      - stack
      - cell
      - separator
      - manifold
      - humidifier
      - heat_exchanger
      - pump
      - reservoir
      - gas_liquid_separator
      - valve
      - sensor_block
      - current_collector
      - bipolar_plate
      - flow_field
      - channel
      - porous_transport_layer
      - catalyst_layer
      - membrane
      - membrane_electrode_assembly

  side:
    description: Electrochemical side or directional assignment.
    allowed_values:
      - anode
      - cathode
      - none
      - inlet_side
      - outlet_side

  phase:
    description: Physical phase or pseudo-phase context.
    allowed_values:
      - gas
      - liquid
      - solid
      - ionomer
      - membrane_phase
      - porous_medium_effective
      - mixed
      - none

  domain:
    description: Numerical or physical domain association.
    allowed_values:
      - fluid
      - solid
      - electrochemical
      - thermal
      - porous
      - membrane
      - channel
      - catalyst_layer
      - porous_transport_layer
      - interface
      - boundary
      - full_domain
      - none

  location_role:
    description: Functional measurement or extraction position.
    allowed_values:
      - inlet
      - outlet
      - upstream
      - downstream
      - center
      - centerline
      - midplane
      - interface
      - boundary
      - corner
      - top
      - bottom
      - left
      - right
      - internal
      - external
      - sensor_port
      - probe_point
      - plane
      - line
      - volume
      - manifold_inlet
      - manifold_outlet
      - stack_inlet
      - stack_outlet
      - cell_inlet
      - cell_outlet
      - channel_inlet
      - channel_outlet

  basis:
    description: Basis used for normalization or reporting.
    allowed_values:
      - none
      - geometric_area
      - active_area
      - electrochemically_active_area
      - cross_sectional_area
      - total_volume
      - pore_volume
      - catalyst_mass
      - membrane_mass
      - dry_mass
      - wet_mass
      - mass_basis
      - mole_basis
      - volume_basis
      - total_basis

  quantity_nature:
    description: Semantic subtype of a quantity.
    allowed_values:
      - absolute
      - gauge
      - differential
      - local
      - averaged
      - apparent
      - effective
      - intrinsic
      - partial
      - total
      - static
      - dynamic
      - superficial
      - true
      - equilibrium
      - operating

  species:
    description: Chemical species associated with the variable.
    allowed_values:
      - none
      - h2
      - o2
      - h2o
      - h_plus
      - oh_minus
      - n2
      - air

  coordinate_reference_type:
    description: Type of explicit spatial reference.
    allowed_values:
      - none
      - sensor_id
      - point_id
      - line_id
      - plane_id
      - volume_id
      - cartesian_point
      - mesh_entity
      - boundary_patch
      - cad_feature

  temporal_context:
    description: Time reference for a reported value.
    allowed_values:
      - instantaneous
      - steady_state
      - transient
      - cycle_resolved
      - end_of_test
      - start_of_test
      - time_averaged
      - timestep
      - snapshot

  data_type:
    description: Allowed basic data types.
    allowed_values:
      - float
      - integer
      - string
      - boolean
      - vector
      - tensor
      - array
      - object

qualifier_sets:

  common_measured_sensor:
    acquisition_origin: measured
    representation: point_value
    evaluation_method: direct_sensor_reading
    temporal_context: instantaneous

  common_measured_timeseries:
    acquisition_origin: measured
    representation: timeseries
    evaluation_method: direct_sensor_reading
    temporal_context: transient

  common_simulated_field:
    acquisition_origin: simulated
    representation: field
    evaluation_method: node_value
    temporal_context: snapshot

  common_simulated_area_average:
    acquisition_origin: derived
    representation: area_average
    evaluation_method: postprocessing_plane_probe
    temporal_context: snapshot

  common_simulated_volume_average:
    acquisition_origin: derived
    representation: volume_average
    evaluation_method: postprocessing_volume_probe
    temporal_context: snapshot

variables:

  - id: temperature
    label: Temperature
    description: Thermodynamic temperature.
    category: variable
    data_type: float
    dimensionality: scalar
    quantity_kind: temperature
    canonical_unit: K
    compatible_units:
      - K
      - degC
    status: active
    tags:
      - thermal
      - cfd
      - experiment
      - electrochemistry
    preferred_qualifiers:
      system:
        - test_bench
        - simulation
      component:
        - anode_loop
        - cathode_loop
        - coolant_loop
        - stack
        - cell
        - channel
        - membrane
        - catalyst_layer
        - porous_transport_layer
      location_role:
        - inlet
        - outlet
        - center
        - midplane
        - sensor_port
        - plane
        - volume
      representation:
        - point_value
        - field
        - area_average
        - volume_average
        - timeseries
      phase:
        - gas
        - liquid
        - solid
        - porous_medium_effective
        - none
    examples:
      - canonical_name: temperature__anode_loop__stack_inlet__point_value
        using_qualifiers:
          system: test_bench
          component: anode_loop
          side: anode
          location_role: stack_inlet
          acquisition_origin: measured
          representation: point_value
          evaluation_method: direct_sensor_reading
          coordinate_reference_type: sensor_id
          temporal_context: transient
      - canonical_name: temperature__membrane__midplane__field
        using_qualifiers:
          system: simulation
          component: membrane
          domain: membrane
          side: none
          location_role: midplane
          acquisition_origin: simulated
          representation: field
          evaluation_method: node_value
          phase: membrane_phase
          temporal_context: snapshot

  - id: pressure
    label: Pressure
    description: Thermodynamic absolute pressure.
    category: variable
    data_type: float
    dimensionality: scalar
    quantity_kind: pressure
    canonical_unit: Pa
    compatible_units:
      - Pa
      - kPa
      - bar
      - mbar
    status: active
    tags:
      - fluid
      - cfd
      - experiment
    preferred_qualifiers:
      quantity_nature:
        - absolute
        - static
      system:
        - test_bench
        - simulation
      component:
        - anode_loop
        - cathode_loop
        - stack
        - channel
        - manifold
      location_role:
        - inlet
        - outlet
        - upstream
        - downstream
        - probe_point
        - plane
      representation:
        - point_value
        - field
        - area_average
        - timeseries
    examples:
      - canonical_name: pressure__cathode_loop__upstream__point_value
        using_qualifiers:
          system: test_bench
          component: cathode_loop
          side: cathode
          location_role: upstream
          acquisition_origin: measured
          representation: point_value
          evaluation_method: direct_sensor_reading
          quantity_nature: absolute
      - canonical_name: pressure__channel__outlet_plane__area_average
        using_qualifiers:
          system: postprocessing
          component: channel
          side: anode
          domain: fluid
          location_role: channel_outlet
          acquisition_origin: derived
          representation: area_average
          evaluation_method: postprocessing_plane_probe
          quantity_nature: absolute

  - id: gauge_pressure
    label: Gauge pressure
    description: Pressure relative to ambient or another defined reference pressure.
    category: variable
    data_type: float
    dimensionality: scalar
    quantity_kind: pressure
    canonical_unit: Pa
    compatible_units:
      - Pa
      - kPa
      - bar
      - mbar
    status: active
    tags:
      - fluid
      - experiment
    preferred_qualifiers:
      quantity_nature:
        - gauge

  - id: pressure_drop
    label: Pressure drop
    description: Pressure difference between two defined locations.
    category: variable
    data_type: float
    dimensionality: scalar
    quantity_kind: pressure_difference
    canonical_unit: Pa
    compatible_units:
      - Pa
      - kPa
      - bar
      - mbar
    status: active
    tags:
      - fluid
      - derived
    required_context_fields:
